<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEG Report Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📜</text></svg>">

</head>

<body>
    <div class="container">
        <div class="header">
            <h1>EEG Report Generator</h1>
            <p>Made with &#128154; by yelircaasi</p>
        </div>

        <div class="main-content">
            <div class="controls-panel">
                <h2>Document Settings</h2>

                <div class="form-group">
                    <label for="reportTitle">Report Title:</label>
                    <input type="text" id="reportTitle" placeholder="EEG Report" />
                </div>

                <div class="form-group">
                    <label for="patientName">Patient Name:</label>
                    <input type="text" id="patientName" placeholder="Peter Peterson" />
                </div>

                <div class="form-group">
                    <label for="date">Date:</label>
                    <input type="date" id="date" />
                </div>

                <div class="form-group">
                    <label for="age">Age:</label>
                    <input type="number" id="age" placeholder="101" />
                </div>

                <div class="form-group">
                    <label for="sex">Sex:</label>
                    <select id="sex">
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>

                <!-- <div class="form-group">
                    <label for="unit">Unit:</label>
                    <input type="text" id="unit" />
                </div> -->

                <div class="form-group">
                    <label for="neuroPhys">Neurophysiologist:</label>
                    <input type="text" id="neuroPhys" placeholder="Aleksandra Aleksandrovna" />
                </div>

                <!-- <div class="form-group">
                    <label for="caseNum">Case #:</label>
                    <input type="text" id="caseNum" />
                </div> -->

                <div class="form-group">
                    <label for="refPhysician">Referring Physician:</label>
                    <input type="text" id="refPhysician" placeholder="Hakim Hakimi"/>
                </div>

                <!-- <div class="form-group">
                    <label for="eegNum">EEG #:</label>
                    <input type="text" id="eegNum" />
                </div> -->

                <!-- <div class="form-group">
                    <label for="descriptionPresets">Description:</label>
                    <select id="descriptionPresets" multiple></select>
                </div> -->
                <div class="form-group">
                    <label for="descriptionFreeform">Description — Additional Notes:</label>
                    <textarea id="descriptionFreeform" placeholder="<EMPTY>"></textarea>
                </div>

                <div class="form-group">
                    <label for="backgroundPresets">Background:</label>
                    <select id="backgroundPresets" multiple></select>
                </div>
                <div class="form-group">
                    <label for="betaPresets">Beta Activity:</label>
                    <select id="betaPresets" multiple></select>
                </div>
                <div class="form-group">
                    <label for="sleepPresets">Sleep:</label>
                    <select id="sleepPresets" multiple></select>
                </div>
                <div class="form-group">
                    <label for="backgroundFreeform">Background — Additional Notes:</label>
                    <textarea id="backgroundFreeform" placeholder="<EMPTY>"></textarea>
                </div>
                <div class="form-group">
                    <label for="findingsPresets">Findings:</label>
                    <select id="findingsPresets" multiple></select>
                </div>
                <div id="findingsPhoticStimulationPresetsDiv" class="form-group hidden">
                    <label for="findingsPhoticStimulationPresets">↳ Findings — Photic Stimulation Suboptions</label>
                    <select id="findingsPhoticStimulationPresets" ></select>
                </div>
                <div id="findingsHyperventilationPresetsDiv" class="form-group hidden">
                    <label for="findingsHyperventilationPresets">↳ Findings — Hyperventilation Suboptions</label>
                    <select id="findingsHyperventilationPresets" ></select>
                </div>
                <div id="findingsFocalSlowingPresetsDiv" class="form-group hidden">
                    <label for="findingsFocalSlowingPresets">↳ Findings — Focal Slowing Suboptions</label>
                    <select id="findingsFocalSlowingPresets" ></select>
                </div>

                <div class="form-group">
                    <label for="findingsFreeform">Findings — Additional Notes:</label>
                    <textarea id="findingsFreeform" placeholder="<EMPTY>"></textarea>
                </div>

                <div class="form-group">
                    <label for="diagnosisPresets">Diagnosis:</label>
                    <select id="diagnosisPresets" multiple></select>
                </div>
                <div id="dischargePresetsDiv" class="form-group hidden">
                    <label for="dischargePresets">↳ Diagnosis — Discharge Suboptions</label>
                    <select id="dischargePresets"></select>
                </div>

                <div class="form-group">
                    <label for="diagnosisFreeform">Diagnosis — Additional Notes:</label>
                    <textarea id="diagnosisFreeform" placeholder="<EMPTY>"></textarea>
                </div>

                <div class="form-group">
                    <label for="interpretationPresets">Clinical Interpretation:</label>
                    <select id="interpretationPresets" multiple></select>
                </div>

                <div class="form-group">
                    <label for="interpretationFreeform">Clinical Interpretation — Additional Notes:</label>
                    <textarea id="interpretationFreeform" placeholder="<EMPTY>"></textarea>
                </div>


                <button class="download-btn" onclick="downloadDocument()">🤮 Word Document</button>
            </div>

            <div class="document-preview">
                <h2>Document Preview</h2>
                <div class="document-content" id="documentContent"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script type="module" src="main.js"></script>
</body>

</html>
